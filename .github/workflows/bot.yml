name: 📈 Actualizar Dashboard

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: false
        default: 'cycle'
        type: choice
        options:
          - cycle
          - dry-run
          - stats

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-bot:
    name: Análisis, Paper Trading y Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 🔍 Debug Info
        run: |
          python --version
          pip --version
          ls -R

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: 🧪 Sanity Check (CCXT)
        run: python -c "import ccxt; print(f'CCXT {ccxt.__version__} cargado correctamente')"

      - name: 🤖 Ejecutar bot
        env:
          TURSO_URL:            ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN:     ${{ secrets.TURSO_AUTH_TOKEN }}
          PAPER_CAPITAL:        ${{ secrets.PAPER_CAPITAL }}
          RISK_PER_TRADE:       ${{ secrets.RISK_PER_TRADE }}
          MIN_SCORE_TO_TRADE:   ${{ secrets.MIN_SCORE_TO_TRADE }}
          CRYPTO_PAIRS:         ${{ secrets.CRYPTO_PAIRS }}
          FOREX_PAIRS:          ${{ secrets.FOREX_PAIRS }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          BINANCE_API_KEY:      ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET:   ${{ secrets.BINANCE_API_SECRET }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          BOT_MODE:             ${{ github.event.inputs.mode || 'cycle' }}
        run: python run.py

      - name: 💾 Commit de base de datos local
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add db/local.db || echo "No local db found"
          git pull --rebase origin main || echo "Pull failed, continuing..."
          git commit -m "🤖 Auto-guardado de DB [skip ci]" || echo "No hay cambios para comitear"
          git push origin main || echo "Error al pushear o sin acceso"

      - name: 📈 Generar HTML
        if: always()
        env:
          TURSO_URL:        ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python generate.py

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: 📊 Subir logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  deploy-pages:
    name: Deploy a GitHub Pages
    needs: run-bot
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
